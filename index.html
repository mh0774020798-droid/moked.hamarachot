<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מוקד המערכות - ניתוב שלוחות</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161e2e;
            --card-hover: #1f293d;
            --accent-color: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #243249;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 2rem auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.8rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        /* פרטי קשר עליונים */
        .info-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .info-item a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .info-item a:hover {
            color: var(--accent-color);
        }

        .info-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        /* סטטיסטיקה מהירה */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .stat-box {
            background-color: rgba(22, 30, 46, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-box .num {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .stat-box .txt {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* מערכת שלוחות דינמית */
        .menu-wrapper {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .menu-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            background: var(--accent-gradient);
            color: #000;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            display: none; /* יוצג רק בתתי תפריטים */
            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 0.9;
        }

        /* גריד של כפתורי שלוחות */
        .grid-branches {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .branch-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: right;
        }

        .branch-card:hover {
            background-color: var(--card-hover);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .branch-num {
            background: var(--accent-gradient);
            color: #000;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-left: 1rem;
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .branch-text {
            font-size: 1.05rem;
            font-weight: 500;
        }

        /* שלוחות ללא מעבר (סוף תפריט) */
        .branch-card.leaf {
            cursor: default;
        }
        .branch-card.leaf:hover {
            background-color: var(--bg-color);
            border-color: var(--border-color);
            transform: none;
        }
        .branch-card.leaf .branch-num {
            background: #334155;
            color: var(--text-main);
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            width: 100%;
            box-sizing: border-box;
            border-top: 1px solid var(--border-color);
        }
        #splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: #0b0f19; /* הצבע הכהה של האתר שלך */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999; /* דואג שזה יהיה מעל הכל */
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

.splash-logo {
    width: 750px !important;  /* מכריח את התמונה להיפתח בגודל גדול */
    max-width: 90% !important; /* דואג שבסמארטפונים היא לא תצא מהמסך */
    height: auto !important;
    animation: none !important;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.05); opacity: 1; }
}

#splash-screen.fade-out {
    opacity: 0;
    visibility: hidden;
}
    </style>
</head>
<body>

        const subMenus = {

                    { num: "10", text: "צבע אדום", isLeaf: true },
                    { isUp: true, text: "גל הדיווחים", id: "11" },
                    { isUp: true, text: "קו המידע", id: "12" },
                    { isUp: true, text: "הקו הביטחוני", id: "13" },
                    { isUp: true, text: "מרכז הספורט", id: "14" }
                ]
            },
            pnai: {
                title: "שלוחה 2 - פנאי",
                branches: [
                    { num: "1", text: "קו המתיחות", isLeaf: true },
                    { num: "2", text: "חבורת תריג", isLeaf: true },
                    { num: "3", text: "מיוזיק בוט", isLeaf: true },
                    { num: "4", text: "ניו מיוזיק", isLeaf: true },
                    { num: "5", text: "דוד החקיין", isLeaf: true },
                    { num: "6", text: "דוד בוים", isLeaf: true },
                    { num: "7", text: "קו המכלול", isLeaf: true },
                    { num: "8", text: "מיוזיק פלוס", isLeaf: true }
                ]
            },
            shimushi: {
                title: "שלוחה 3 - שימושי",
                branches: [
                    { num: "1", text: "איי קול", isLeaf: true },
                    { num: "2", text: "קו העבודות חינמי", isLeaf: true },
                    { num: "3", text: "קו העבודות", isLeaf: true },
                    { num: "4", text: "וירטואל פלוס", isLeaf: true },
                    { num: "5", text: "מי זה פון", isLeaf: true },
                    { num: "6", text: "בורספון", isLeaf: true },
                    { num: "7", text: "קו מניעת פספוס שיחות", isLeaf: true },
                    { num: "8", text: "נטו קול", isLeaf: true },
                    { num: "9", text: "מוקד העסקים", isLeaf: true },
                    { num: "10", text: "טל' מי", isLeaf: true },
                    { num: "11", text: "עזר פון", isLeaf: true },
                    { num: "12", text: "תחזית מזג האויר", isLeaf: true },
                    { num: "13", text: "תלונות תחבורה ציבורית", isLeaf: true },
                    { num: "14", text: "ת\"ת מירפלד", isLeaf: true }
                ]
            },
            mumlazim: {
                title: "שלוחה 4 - מומלצים",
                branches: [
                    { num: "1", text: "מבזקים פלוס", isLeaf: true },

                ]

            tosafim: {

                branches: [
                    { num: "1", text: "שליחת מיילים", isLeaf: true },

                ]

            tosafim_sys: {

                branches: [
                    { num: "1", text: "שיתוף המערכת לחבר", isLeaf: true },
                    { num: "2", text: "קבלת שיחה חוזרת מיד בכניסה", target: "call_back_sub" }
                ]
            },
            call_back_sub: {
                title: "שיחה חוזרת בכניסה",
                branches: [
                    { num: "1", text: "הרשמה", isLeaf: true },
                    { num: "2", text: "ביטול הרשמה", isLeaf: true }
                ]
            },
            shiluha_0: {
                title: "שלוחה 0 - שירות והודעות מערכת",
                branches: [
                    { num: "1", text: "שמיעת הודעות מערכת", isLeaf: true },
                    { num: "2", text: "שליחת הודעות לניהול", isLeaf: true },
                    { num: "3", text: "הרשמה לצינתוקים", isLeaf: true },
                    { num: "4", text: "מענה אנושי", isLeaf: true },
                    { num: "5", text: "הודעות על אירועים חדשותיים משמעותיים", isLeaf: true },
                    { num: "6", text: "שליחת מיילים להנהלה", isLeaf: true },
                    { num: "7", text: "שמיעת המייל של הקו", isLeaf: true },
                    { num: "8", text: "שמיעת המספר הפתוח לכשרים", isLeaf: true }
                ]
            }
        };

        let navigationHistory = [menuData];

        function renderMenu(menuObject) {
            const titleEl = document.getElementById('menu-title');
            const containerEl = document.getElementById('branches-container');
            const backBtn = document.getElementById('back-btn');

            titleEl.innerText = menuObject.title;

            if (navigationHistory.length > 1) {
                backBtn.style.display = 'block';
            } else {
                backBtn.style.display = 'none';
            }

            containerEl.innerHTML = '';

            menuObject.branches.forEach(branch => {
                const card = document.createElement('div');
                card.className = 'branch-card' + (branch.isLeaf ? ' leaf' : '');
                
                card.innerHTML = `
                    <div class="branch-num">${branch.num}</div>
                    <div class="branch-text">${branch.text}</div>
                `;

                if (!branch.isLeaf && branch.target && subMenus[branch.target]) {
                    card.onclick = () => {
                        navigationHistory.push(subMenus[branch.target]);
                        renderMenu(subMenus[branch.target]);
                    };
                }

                containerEl.appendChild(card);
            });
        }

        function goBack() {
            if (navigationHistory.length > 1) {
                navigationHistory.pop();
                const previousMenu = navigationHistory[navigationHistory.length - 1];
                renderMenu(previousMenu);
            }
        }

        renderMenu(menuData);
    </script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(function() {
            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.classList.add('fade-out');
            }
        }, 5000); // 5000 מילי-שניות = 5 שניות בדיוק
    });
</script>
</body>
</html>
